name: voice_assistant_app
description: CTJ Voice Chat v1.0 - A spiritual AI voice assistant app with glassmorphism UI and advanced voice processing capabilities.

publish_to: "none"

version: 1.0.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.6
  get_storage: ^2.1.1
  provider: ^6.1.2

  # UI Components
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.12.0

  # Audio & Voice
  just_audio: ^0.9.46
  record: ^5.2.1
  permission_handler: ^11.4.0
  speech_to_text: ^7.0.0
  flutter_tts: ^3.8.5
  wakelock_plus: ^1.1.4
  audioplayers: ^6.1.0
  vibration: ^3.0.0
  sherpa_onnx: ^1.12.30

  # File Operations
  share_plus: ^10.0.0

  # Notifications & Scheduling
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.2

  # Connectivity
  dio: ^5.4.0
  connectivity_plus: ^6.0.3

  # Location & Weather
  geolocator: ^10.1.0
  http: ^1.2.0
  web_socket_channel: ^2.4.0
  crypto: ^3.0.7

  # Advertisements
  google_mobile_ads: ^5.3.1

  # Animations
  flutter_animate: ^4.3.0
  lottie: ^3.0.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.2.1
  path_provider: ^2.1.1
  url_launcher: ^6.2.1
  open_file: ^3.3.2
  flutter_pdfview: 1.3.2

  # Video & File Picking
  video_player: ^2.8.2
  file_picker: ^8.0.0+1

  # Theme & Styling
  google_fonts: ^6.1.0
  flex_color_scheme: ^7.3.1
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  supabase_flutter: ^2.12.4
  image_cropper: ^12.2.1
  video_trimmer: ^5.0.0
  flutter_native_video_trimmer: ^1.1.9
  image_picker: ^1.2.2
  # google_sign_in removed due to compiler conflicts in release build

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/simple orb/
    - assets/images/diamond orb/
    - assets/images/profile_pic/
    - assets/sounds/
    - assets/sounds/game_sounds/
    - assets/sounds/game_sounds/nature/
    - assets/fonts/
    - assets/RESUME.pdf

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

dependency_overrides:
  record_linux: ^1.3.0
  record_platform_interface: ^1.5.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon/app_icon_new.png"
  adaptive_icon_background: "#fefefe"
  adaptive_icon_foreground: "assets/images/icon/app_icon_new.png"
  remove_alpha_ios: true # Required for Apple App Store compliance


  # Generated icons are ready for:
  # - Google Play Store submission ✅
  # - Apple App Store submission ✅
  # - Web and desktop deployment ✅
